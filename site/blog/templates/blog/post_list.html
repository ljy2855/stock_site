{% extends 'blog/base.html' %} 

{% block content %}


<div class="content container">
    <div class="row">


            {% for stock in stock_list %}
            <div class="post">
                <h2><a href="{% url 'post_detail' pk=stock.pk %}">{{ stock.name }}</a></h2>
                <div class ="date">
                    {{ stock.price}}
                    {% if stock.up_down < 0 %}
                        <minus> {{stock.up_down}}% </minus>
                    {% else %}
                        <plus> +{{stock.up_down}}% </plus>
                    {% endif %}                   
                </div>

            </div>
            {% endfor %}

    </div>
</div>

{% endblock %}
